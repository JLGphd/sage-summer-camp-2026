<svg width="100%" viewBox="0 0 680 1020" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Aquatic plant VLM classification pipeline</title>
  <desc>End-to-end workflow for testing VLM and SAM models, clustering analysis, and conditional deployment</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .title { font-size: 14px; font-weight: 500; fill: #042C53; }
      .subtitle { font-size: 12px; font-weight: 400; fill: #185FA5; }
      .label { font-size: 12px; font-weight: 400; fill: #444441; }
      
      /* Color scheme for phases */
      .blue-phase { fill: #E6F1FB; stroke: #185FA5; }
      .purple-phase { fill: #EEEDFE; stroke: #534AB7; }
      .teal-phase { fill: #E1F5EE; stroke: #0F6E56; }
      .coral-phase { fill: #FAECE7; stroke: #993C1D; }
      .amber-phase { fill: #FAEEDA; stroke: #854F0B; }
      .green-phase { fill: #EAF3DE; stroke: #3B6D11; }
      .pink-phase { fill: #FBEAF0; stroke: #993556; }
      .red-phase { fill: #FCEBEB; stroke: #A32D2D; }
      
      .arrow-line { fill: none; stroke: #5F5E5A; stroke-width: 1.5; }
      .connector { fill: none; stroke: #888780; stroke-width: 1.5; }
      .dashed-line { fill: none; stroke: #B4B2A9; stroke-width: 1; stroke-dasharray: 4 2; }
    </style>
  </defs>

  <!-- Phase 1: Data Preparation -->
  <rect class="blue-phase" x="140" y="20" width="400" height="52" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="38" text-anchor="middle">Phase 1: Data Preparation</text>
  <text class="subtitle" x="340" y="54" text-anchor="middle">Load images from SSD (organized by date)</text>
  
  <line class="arrow-line" x1="340" y1="72" x2="340" y2="110" marker-end="url(#arrow)"/>

  <!-- Phase 2: Model Inference (two branches) -->
  <text class="title" x="340" y="108" text-anchor="middle">Phase 2: Model Inference</text>

  <!-- VLM Branch -->
  <rect class="purple-phase" x="100" y="120" width="180" height="60" rx="8" stroke-width="0.5"/>
  <text class="title" x="190" y="140" text-anchor="middle">VLM (Zero-shot)</text>
  <text class="subtitle" x="190" y="158" text-anchor="middle">Classification &amp; descriptions</text>

  <!-- SAM Branch -->
  <rect class="purple-phase" x="400" y="120" width="180" height="60" rx="8" stroke-width="0.5"/>
  <text class="title" x="490" y="140" text-anchor="middle">SAM Segmentation</text>
  <text class="subtitle" x="490" y="158" text-anchor="middle">Masks &amp; embeddings</text>

  <!-- Connectors down -->
  <path class="connector" d="M190 180 L190 200 L340 200 L340 220" marker-end="url(#arrow)"/>
  <path class="connector" d="M490 180 L490 200 L340 200 L340 220" marker-end="url(#arrow)"/>

  <!-- Phase 3: Feature Extraction -->
  <rect class="teal-phase" x="140" y="220" width="400" height="60" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="240" text-anchor="middle">Phase 3: Feature Extraction</text>
  <text class="subtitle" x="340" y="258" text-anchor="middle">Combine VLM text embeddings + SAM visual features</text>
  
  <line class="arrow-line" x1="340" y1="280" x2="340" y2="310" marker-end="url(#arrow)"/>

  <!-- Phase 4: Clustering & Visualization -->
  <rect class="coral-phase" x="100" y="310" width="480" height="80" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="330" text-anchor="middle">Phase 4: Clustering &amp; Visualization</text>
  <text class="subtitle" x="340" y="348" text-anchor="middle">UMAP/t-SNE dimensionality reduction</text>
  <text class="subtitle" x="340" y="366" text-anchor="middle">K-means or DBSCAN clustering</text>
  <text class="subtitle" x="340" y="384" text-anchor="middle">Plot 2D scatter: color by cluster, size by confidence</text>
  
  <line class="arrow-line" x1="340" y1="390" x2="340" y2="420" marker-end="url(#arrow)"/>

  <!-- Decision Gate 1 -->
  <rect class="amber-phase" x="180" y="420" width="320" height="48" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="440" text-anchor="middle">Decision: Distinct clusters?</text>
  <text class="subtitle" x="340" y="456" text-anchor="middle">Silhouette score, inter-cluster distance</text>

  <!-- NO path (abort) -->
  <path class="connector" d="M180 444 L80 444 L80 520 L100 520" marker-end="url(#arrow)"/>
  <text class="label" x="110" y="490" text-anchor="start">No: Iterate model parameters</text>

  <!-- YES path (continue) -->
  <line class="arrow-line" x1="340" y1="468" x2="340" y2="500" marker-end="url(#arrow)"/>
  <text class="label" x="360" y="485" text-anchor="start" fill="#3B6D11">Yes</text>

  <!-- Phase 5: Statistical Analysis -->
  <rect class="green-phase" x="100" y="500" width="480" height="80" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="520" text-anchor="middle">Phase 5: Statistical Analysis</text>
  <text class="subtitle" x="340" y="538" text-anchor="middle">Export clusters to 3rd-party tool (Prism, R, Python)</text>
  <text class="subtitle" x="340" y="556" text-anchor="middle">Fit best-fit lines &amp; assess cluster purity</text>
  <text class="subtitle" x="340" y="574" text-anchor="middle">Identify which features distinguish clusters</text>
  
  <line class="arrow-line" x1="340" y1="580" x2="340" y2="610" marker-end="url(#arrow)"/>

  <!-- Decision Gate 2 -->
  <rect class="amber-phase" x="160" y="610" width="360" height="48" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="630" text-anchor="middle">Decision: Model promising?</text>
  <text class="subtitle" x="340" y="646" text-anchor="middle">&gt;85% cluster purity, clear feature separation</text>

  <!-- NO path (stop) -->
  <path class="connector" d="M160 634 L40 634 L40 730 L100 730" marker-end="url(#arrow)"/>
  <text class="label" x="45" y="625" text-anchor="start">No: Stop or revise model</text>

  <!-- YES path (continue) -->
  <line class="arrow-line" x1="340" y1="658" x2="340" y2="690" marker-end="url(#arrow)"/>
  <text class="label" x="360" y="675" text-anchor="start" fill="#3B6D11">Yes</text>

  <!-- Phase 6: Model Optimization & Packaging -->
  <rect class="pink-phase" x="80" y="690" width="520" height="90" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="710" text-anchor="middle">Phase 6: Model Optimization &amp; Packaging</text>
  <text class="subtitle" x="340" y="728" text-anchor="middle">Refine VLM prompts based on cluster analysis</text>
  <text class="subtitle" x="340" y="746" text-anchor="middle">Quantize/compress SAM + combine into inference pipeline</text>
  <text class="subtitle" x="340" y="764" text-anchor="middle">Create inference script (batch predictions + clustering)</text>
  
  <line class="arrow-line" x1="340" y1="780" x2="340" y2="810" marker-end="url(#arrow)"/>

  <!-- Phase 7: Containerization & Deployment -->
  <rect class="red-phase" x="80" y="810" width="520" height="100" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="830" text-anchor="middle">Phase 7: Build &amp; Deploy ECR App</text>
  <text class="subtitle" x="340" y="848" text-anchor="middle">Dockerfile: Python base, install VLM/SAM libs</text>
  <text class="subtitle" x="340" y="866" text-anchor="middle">Push to ECR (AWS Elastic Container Registry)</text>
  <text class="subtitle" x="340" y="884" text-anchor="middle">Deploy to your node (k8s pod or direct Docker)</text>
  <text class="subtitle" x="340" y="902" text-anchor="middle">Test with live/batch image streams</text>
  
  <line class="arrow-line" x1="340" y1="910" x2="340" y2="940" marker-end="url(#arrow)"/>

  <!-- Success -->
  <rect class="green-phase" x="200" y="940" width="280" height="44" rx="8" stroke-width="0.5"/>
  <text class="title" x="340" y="962" text-anchor="middle">Aquatic plant classifier in production</text>

  <!-- Abort/Iterate loop return -->
  <path class="dashed-line" d="M80 520 Q40 700 80 730 L100 730"/>

</svg>
